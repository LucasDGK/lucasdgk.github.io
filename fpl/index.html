<!DOCTYPE html>
<html lang="en" class="dark">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Helios World Cup League</title>
  <meta name="theme-color" content="#000000">
  <link rel="preload" href="../assets/fonts/AmazonEmberDisplay_Regular.woff2" as="font" type="font/woff2" crossorigin>
  <link rel="preload" href="../assets/fonts/AmazonEmberDisplay_Bold.woff2" as="font" type="font/woff2" crossorigin>
  <link rel="stylesheet" href="assets/css/welcome.css?v=wc-welcome">
</head>
<body>

  <div class="page">

    <!-- Flags marquee header -->
    <header class="flags-header">
      <div class="flags-track" id="flags-track" style="opacity:0; transition: opacity 700ms;">
        <div class="flags-loop">
          <div class="flags-set" id="flags-set-1"></div>
          <div class="flags-set" id="flags-set-2" aria-hidden="true"></div>
        </div>
      </div>
    </header>

    <!-- Welcome screen -->
    <main class="welcome">
      <img class="wc-logo" id="wc-logo"
           src="../assets/fifa-world-cup-2026-fire-tv-logo-white-h300.png"
           alt="FIFA World Cup 2026">

      <div class="wc-heading">
        <h1 class="wc-title">Helios World Cup League</h1>
        <p class="wc-subtitle">Tournament starts June 11, 2026</p>
      </div>

      <div class="wc-countdown" aria-label="Countdown until the tournament starts">
        <div class="wc-countdown-cell">
          <div class="wc-countdown-value" id="cd-days">--</div>
          <div class="wc-countdown-label">days</div>
        </div>
        <div class="wc-countdown-cell">
          <div class="wc-countdown-value" id="cd-hours">--</div>
          <div class="wc-countdown-label">hours</div>
        </div>
        <div class="wc-countdown-cell">
          <div class="wc-countdown-value" id="cd-minutes">--</div>
          <div class="wc-countdown-label">min</div>
        </div>
        <div class="wc-countdown-cell">
          <div class="wc-countdown-value" id="cd-seconds">--</div>
          <div class="wc-countdown-label">sec</div>
        </div>
      </div>
    </main>

  </div>

  <script src="assets/js/welcome.js?v=wc-welcome"></script>

</body>
</html>
