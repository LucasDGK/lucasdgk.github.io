name: Fetch FPL Data

on:
  schedule:
    # Runs every hour when no active GW
    - cron: '0 * * * *'
  workflow_dispatch:
  push:
    branches: [main, master]
    paths:
      - '.github/workflows/fetch-fpl-data.yml'
      - '.github/scripts/fetch_fpl.py'

jobs:
  fetch:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install dependencies
        run: pip install requests

      - name: Fetch FPL data
        run: python .github/scripts/fetch_fpl.py

      - name: Commit and push updated data
        run: |
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git config user.name  "github-actions[bot]"
          git add fpl/data.json
          git diff --staged --quiet || (
            git commit -m "chore: update FPL data [skip ci]" && git push
          )
